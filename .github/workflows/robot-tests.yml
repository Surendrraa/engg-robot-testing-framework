name: Robot Framework CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Robot Framework tests
        run: |
          mkdir -p reports
          robot --outputdir reports tests

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports-${{ github.run_id }}
          path: reports

      - name: Checkout gh-pages branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare Pages content with run history
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e
          TS="$(date -u +'%Y-%m-%d_%H-%M-%S_UTC')"
          DEST="gh-pages/runs/${TS}"

          mkdir -p "${DEST}"
          cp -r reports/* "${DEST}/"

          {
            echo "<!doctype html>"
            echo "<html><head><meta charset='utf-8'><title>Robot Framework Reports</title></head><body>"
            echo "<h1>Robot Framework Report History</h1>"
            echo "<p>All runs are stored by UTC timestamp.</p>"
            echo "<ul>"

            for dir in $(ls -1 gh-pages/runs 2>/dev/null | sort -r); do
              echo "<li><a href='runs/${dir}/log.html'>${dir}</a> - <a href='runs/${dir}/report.html'>report</a> - <a href='runs/${dir}/output.xml'>output.xml</a></li>"
            done

            echo "</ul>"
            echo "<hr>"
            echo "<p>Last update: ${TS}</p>"
            echo "<p>Run number: ${RUN_NUMBER}, Run ID: ${RUN_ID}</p>"
            echo "<p>Commit: ${COMMIT_SHA}</p>"
            echo "</body></html>"
          } > gh-pages/index.html

      - name: Deploy reports to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages
