name: Robot Framework CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Robot Framework tests
        run: |
          mkdir -p reports
          robot --outputdir reports tests/auth tests/cart

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports-${{ github.run_id }}
          path: reports

      - name: Checkout gh-pages branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare Pages content with run history
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e
          TS="$(date -u +'%Y-%m-%d_%H-%M-%S_UTC')"
          DEST="gh-pages/runs/${TS}"

          mkdir -p "${DEST}"
          cp -r reports/* "${DEST}/"

          {
            echo "<!doctype html>"
            echo "<html><head><meta charset='utf-8'><title>Robot Framework Reports</title>"
            echo "<style>"
            echo "body { font-family: Arial, sans-serif; margin: 24px; }"
            echo "table { border-collapse: collapse; width: 100%; margin-top: 12px; }"
            echo "th, td { border: 1px solid #d0d7de; padding: 8px 10px; text-align: left; }"
            echo "th { background: #f6f8fa; }"
            echo "tr:nth-child(even) { background: #fbfbfb; }"
            echo "a { color: #0969da; text-decoration: none; }"
            echo "a:hover { text-decoration: underline; }"
            echo ".muted { color: #57606a; }"
            echo "</style></head><body>"
            echo "<h1>Robot Framework Report History</h1>"
            echo "<p>All runs are stored by UTC timestamp.</p>"
            echo "<table>"
            echo "<thead><tr><th>Run Timestamp (UTC)</th><th>Log</th><th>Report</th><th>Output XML</th><th>Actions Run</th></tr></thead>"
            echo "<tbody>"

            for dir in $(ls -1 gh-pages/runs 2>/dev/null | sort -r); do
              echo "<tr>"
              echo "<td>${dir}</td>"
              echo "<td><a href='runs/${dir}/log.html'>log.html</a></td>"
              echo "<td><a href='runs/${dir}/report.html'>report.html</a></td>"
              echo "<td><a href='runs/${dir}/output.xml'>output.xml</a></td>"
              echo "<td><a href='https://github.com/${REPO}/actions/runs/${RUN_ID}'>run ${RUN_NUMBER}</a></td>"
              echo "</tr>"
            done

            echo "</tbody></table>"
            echo "<hr>"
            echo "<p class='muted'>Last update: ${TS}</p>"
            echo "<p class='muted'>Latest run number: ${RUN_NUMBER}, Run ID: ${RUN_ID}</p>"
            echo "<p class='muted'>Latest commit: ${COMMIT_SHA}</p>"
            echo "</body></html>"
          } > gh-pages/index.html

      - name: Deploy reports to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages
